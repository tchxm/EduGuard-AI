<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#0B0F28"/>
  <g transform="translate(50, 50)">
    <!-- Clipboard -->
    <rect x="100" y="50" width="200" height="250" rx="10" ry="10" fill="#ffffff" stroke="#4e73df" stroke-width="3"/>
    <rect x="100" y="50" width="200" height="40" rx="10" ry="10" fill="#4e73df"/>
    <circle cx="200" cy="30" r="25" fill="#ffffff" stroke="#4e73df" stroke-width="3"/>
    
    <!-- Checklist -->
    <rect x="120" y="110" width="160" height="30" rx="5" ry="5" fill="#f0f0f0"/>
    <circle cx="135" cy="125" r="8" fill="#1cc88a"/>
    <polyline points="130,125 135,130 140,120" stroke="#ffffff" stroke-width="2" fill="none"/>
    <line x1="150" y1="125" x2="260" y2="125" stroke="#5a5c69" stroke-width="2"/>
    
    <rect x="120" y="150" width="160" height="30" rx="5" ry="5" fill="#f0f0f0"/>
    <circle cx="135" cy="165" r="8" fill="#1cc88a"/>
    <polyline points="130,165 135,170 140,160" stroke="#ffffff" stroke-width="2" fill="none"/>
    <line x1="150" y1="165" x2="260" y2="165" stroke="#5a5c69" stroke-width="2"/>
    
    <rect x="120" y="190" width="160" height="30" rx="5" ry="5" fill="#f0f0f0"/>
    <circle cx="135" cy="205" r="8" fill="#e74a3b"/>
    <line x1="130" y1="200" x2="140" y2="210" stroke="#ffffff" stroke-width="2"/>
    <line x1="130" y1="210" x2="140" y2="200" stroke="#ffffff" stroke-width="2"/>
    <line x1="150" y1="205" x2="260" y2="205" stroke="#5a5c69" stroke-width="2"/>
    
    <rect x="120" y="230" width="160" height="30" rx="5" ry="5" fill="#f0f0f0"/>
    <circle cx="135" cy="245" r="8" fill="#1cc88a"/>
    <polyline points="130,245 135,250 140,240" stroke="#ffffff" stroke-width="2" fill="none"/>
    <line x1="150" y1="245" x2="260" y2="245" stroke="#5a5c69" stroke-width="2"/>
    
    <!-- Camera / Face Detection -->
    <rect x="350" y="100" width="180" height="140" rx="10" ry="10" fill="#ffffff" stroke="#4e73df" stroke-width="3"/>
    <circle cx="440" cy="170" r="50" fill="#f0f0f0" stroke="#4e73df" stroke-width="2"/>
    <circle cx="440" cy="170" r="35" fill="#f8f9fc"/>
    <circle cx="440" cy="170" r="15" fill="#4e73df"/>
    <circle cx="420" cy="150" r="5" fill="#4e73df"/>
    <rect x="380" y="240" width="120" height="10" rx="5" ry="5" fill="#4e73df"/>
    
    <!-- Face recognition lines -->
    <rect x="390" y="120" width="100" height="100" rx="50" ry="50" fill="none" stroke="#1cc88a" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="390" y1="120" x2="490" y2="220" stroke="#1cc88a" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="390" y1="220" x2="490" y2="120" stroke="#1cc88a" stroke-width="1" stroke-dasharray="5,5"/>
  
  </g>
  <text x="320" y="390" font-family="Arial" font-size="24" fill="#ffffff" text-anchor="middle">EduGuardAI Attendance System</text>
</svg> 